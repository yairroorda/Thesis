# @package _global_

seed: 12345

# path to original working directory
# hydra hijacks working directory by changing it to the current log directory,
# so it's useful to have this path as a special variable
# learn more here: https://hydra.cc/docs/next/tutorials/basic/running_your_app/working_directory
work_dir: ${hydra:runtime.cwd}

# use command-line overrides with your integration entrypoint for easy debugging.
debug: False

# pretty print config at the start of the run using Rich library
# TODO: check everything is well printed
print_config: True

# disable python warnings if they annoy you
ignore_warnings: True

# Inference-oriented defaults for local prediction usage.
defaults:
  - _self_  # for hydra legacy reasons

  - datamodule: hdf5_datamodule.yaml
  - dataset_description: 20220607_151_dalles_proto.yaml  # describes input features and classes

  - logger: csv
  - task: default.yaml
  - predict: default.yaml

  - hydra: default.yaml
